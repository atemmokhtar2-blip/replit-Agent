openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: AI Agent Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: projects
    description: Project management
  - name: notifications
    description: Notification operations
  - name: admin
    description: Admin operations
  - name: audit
    description: Audit log operations
  - name: ai
    description: AI conversations and provider management
  - name: storage
    description: Project file storage
  - name: memory
    description: Project memory store

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- Auth ---
  /v1/auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # --- Users ---
  /v1/users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /v1/users/me/password:
    patch:
      operationId: changePassword
      tags: [users]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # --- Projects ---
  /v1/projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List user projects
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, archived]
        - name: project_type
          in: query
          schema:
            type: string
            enum: [website, bot]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /v1/projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/projects/{projectId}/archive:
    post:
      operationId: archiveProject
      tags: [projects]
      summary: Archive a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /v1/projects/{projectId}/members:
    get:
      operationId: listProjectMembers
      tags: [projects]
      summary: List project members
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"

  /v1/projects/stats/summary:
    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Get project statistics summary
      responses:
        "200":
          description: Project stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStats"

  /v1/projects/recent:
    get:
      operationId: getRecentProjects
      tags: [projects]
      summary: Get recently active projects
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Recent projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  # --- Notifications ---
  /v1/notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List user notifications
      parameters:
        - name: is_read
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"

  /v1/notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /v1/notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/notifications/unread-count:
    get:
      operationId: getUnreadCount
      tags: [notifications]
      summary: Get unread notification count
      responses:
        "200":
          description: Count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCount"

  # --- Admin ---
  /v1/admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin list all users
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum: [user, moderator, admin, super_admin]
        - name: is_active
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"

  /v1/admin/users/{userId}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: Admin get user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Admin update user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /v1/admin/users/{userId}/deactivate:
    post:
      operationId: adminDeactivateUser
      tags: [admin]
      summary: Admin deactivate user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/admin/stats:
    get:
      operationId: getSystemStats
      tags: [admin]
      summary: Get system statistics
      responses:
        "200":
          description: System stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStats"

  /v1/admin/projects:
    get:
      operationId: adminListProjects
      tags: [admin]
      summary: Admin list all projects
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"

  # --- Audit ---
  /v1/audit/logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit logs
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"

  # --- AI Conversations ---
  /v1/ai/conversations:
    get:
      operationId: listConversations
      tags: [ai]
      summary: List conversations
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIConversationList"
    post:
      operationId: createConversation
      tags: [ai]
      summary: Create a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIConversation"

  /v1/ai/conversations/{conversationId}:
    get:
      operationId: getConversation
      tags: [ai]
      summary: Get conversation with messages
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteConversation
      tags: [ai]
      summary: Delete a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/ai/conversations/{conversationId}/messages:
    get:
      operationId: listMessages
      tags: [ai]
      summary: List messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Message list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIMessageList"
    post:
      operationId: sendMessage
      tags: [ai]
      summary: Send a message and receive AI reply
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIMessageInput"
      responses:
        "201":
          description: Message pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIMessagePair"

  # --- AI Provider Registry ---
  /v1/ai/providers/available:
    get:
      operationId: listAvailableProviders
      tags: [ai]
      summary: List all built-in provider definitions
      responses:
        "200":
          description: Available providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AIProviderDefinition"

  /v1/ai/providers:
    get:
      operationId: listMyProviders
      tags: [ai]
      summary: List user's configured providers
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AIProviderConfig"
    post:
      operationId: createProvider
      tags: [ai]
      summary: Add a provider configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderConfigInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProviderConfig"

  /v1/ai/providers/{providerId}:
    patch:
      operationId: updateProvider
      tags: [ai]
      summary: Update a provider configuration
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderConfigUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProviderConfig"
    delete:
      operationId: deleteProvider
      tags: [ai]
      summary: Delete a provider configuration
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/ai/providers/{providerId}/activate:
    post:
      operationId: activateProvider
      tags: [ai]
      summary: Set provider as active
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProviderActivateResponse"

  /v1/ai/providers/{providerId}/test:
    post:
      operationId: testProvider
      tags: [ai]
      summary: Test provider connection
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProviderTestResult"

  /v1/ai/providers/{providerId}/models:
    get:
      operationId: listProviderModels
      tags: [ai]
      summary: List models available from a provider
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIModelList"

  # --- Project File Storage ---
  /v1/storage/projects/{projectId}/files:
    get:
      operationId: listProjectFiles
      tags: [storage]
      summary: List project files
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFileList"
    post:
      operationId: createProjectFile
      tags: [storage]
      summary: Create a project file
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectFileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFile"

  /v1/storage/projects/{projectId}/files/{fileId}:
    get:
      operationId: getProjectFile
      tags: [storage]
      summary: Get a project file
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFile"
    put:
      operationId: updateProjectFile
      tags: [storage]
      summary: Update a project file
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectFileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFile"
    delete:
      operationId: deleteProjectFile
      tags: [storage]
      summary: Delete a project file
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # --- Project Memory ---
  /v1/memory/projects/{projectId}:
    get:
      operationId: getProjectMemory
      tags: [memory]
      summary: List all memory entries for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Memory list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryList"
    delete:
      operationId: clearProjectMemory
      tags: [memory]
      summary: Clear all memory for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/memory/projects/{projectId}/{key}:
    get:
      operationId: getMemoryEntry
      tags: [memory]
      summary: Get a memory entry by key
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Memory entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: setMemoryEntry
      tags: [memory]
      summary: Set (upsert) a memory entry
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryEntryInput"
      responses:
        "200":
          description: Upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"
    delete:
      operationId: deleteMemoryEntry
      tags: [memory]
      summary: Delete a memory entry
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details:
          type: ["object", "null"]

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # Auth schemas
    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshInput:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordInput:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8

    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string

    AuthResponse:
      type: object
      required: [user, access_token, refresh_token, token_type]
      properties:
        user:
          $ref: "#/components/schemas/User"
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string

    # User schemas
    User:
      type: object
      required: [id, username, email, role, is_active, created_at, updated_at]
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        avatar_url:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, moderator, admin, super_admin]
        is_active:
          type: boolean
        last_login:
          type: ["string", "null"]
        created_at:
          type: string
        updated_at:
          type: string

    UserUpdate:
      type: object
      properties:
        username:
          type: string
          minLength: 3
        avatar_url:
          type: ["string", "null"]

    ChangePasswordInput:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8

    # Project schemas
    Project:
      type: object
      required: [id, user_id, name, project_type, status, created_at, updated_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        project_type:
          type: string
          enum: [website, bot]
        status:
          type: string
          enum: [draft, active, archived]
        created_at:
          type: string
        updated_at:
          type: string

    ProjectInput:
      type: object
      required: [name, project_type]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        project_type:
          type: string
          enum: [website, bot]

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, active, archived]

    ProjectList:
      type: object
      required: [items, total, page, per_page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    ProjectStats:
      type: object
      required: [total, by_status, by_type]
      properties:
        total:
          type: integer
        by_status:
          type: object
          properties:
            draft:
              type: integer
            active:
              type: integer
            archived:
              type: integer
        by_type:
          type: object
          properties:
            website:
              type: integer
            bot:
              type: integer

    ProjectMember:
      type: object
      required: [id, project_id, user_id, role, created_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        user_id:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]
        invited_by:
          type: ["string", "null"]
        user:
          $ref: "#/components/schemas/User"
        created_at:
          type: string

    # Notification schemas
    Notification:
      type: object
      required: [id, user_id, title, message, is_read, created_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        title:
          type: string
        message:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string

    NotificationList:
      type: object
      required: [items, total, page, per_page, unread_count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        unread_count:
          type: integer

    UnreadCount:
      type: object
      required: [count]
      properties:
        count:
          type: integer

    # Admin schemas
    AdminUserList:
      type: object
      required: [items, total, page, per_page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    AdminUserUpdate:
      type: object
      properties:
        role:
          type: string
          enum: [user, moderator, admin, super_admin]
        is_active:
          type: boolean

    SystemStats:
      type: object
      required: [total_users, active_users, total_projects, projects_by_type, projects_by_status, new_users_today, new_projects_today]
      properties:
        total_users:
          type: integer
        active_users:
          type: integer
        total_projects:
          type: integer
        projects_by_type:
          type: object
          properties:
            website:
              type: integer
            bot:
              type: integer
        projects_by_status:
          type: object
          properties:
            draft:
              type: integer
            active:
              type: integer
            archived:
              type: integer
        new_users_today:
          type: integer
        new_projects_today:
          type: integer

    # Audit schemas
    AuditLog:
      type: object
      required: [id, action, created_at]
      properties:
        id:
          type: string
        user_id:
          type: ["string", "null"]
        action:
          type: string
        metadata:
          type: ["object", "null"]
        created_at:
          type: string
        user:
          $ref: "#/components/schemas/User"

    AuditLogList:
      type: object
      required: [items, total, page, per_page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    # AI schemas
    AIConversation:
      type: object
      required: [id, user_id, title, status, created_at, updated_at]
      properties:
        id:
          type: string
        project_id:
          type: ["string", "null"]
        user_id:
          type: string
        title:
          type: ["string", "null"]
        status:
          type: string
        created_at:
          type: string
        updated_at:
          type: string

    AIConversationList:
      type: object
      required: [items, total, page, per_page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AIConversation"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    AIConversationInput:
      type: object
      properties:
        title:
          type: string
        project_id:
          type: string

    AIMessage:
      type: object
      required: [id, conversation_id, role, content, created_at]
      properties:
        id:
          type: string
        conversation_id:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        metadata:
          type: ["object", "null"]
        created_at:
          type: string

    AIMessageList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AIMessage"
        total:
          type: integer

    AIMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        model:
          type: string

    AIMessagePair:
      type: object
      required: [user_message, assistant_message]
      properties:
        user_message:
          $ref: "#/components/schemas/AIMessage"
        assistant_message:
          $ref: "#/components/schemas/AIMessage"

    AIConversationWithMessages:
      allOf:
        - $ref: "#/components/schemas/AIConversation"
        - type: object
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/AIMessage"

    AIProviderCapabilities:
      type: object
      required: [chat, streaming, vision, function_calling, free_models_available]
      properties:
        chat:
          type: boolean
        streaming:
          type: boolean
        vision:
          type: boolean
        function_calling:
          type: boolean
        free_models_available:
          type: boolean

    AIProviderDefinition:
      type: object
      required: [slug, name, description, capabilities]
      properties:
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        capabilities:
          $ref: "#/components/schemas/AIProviderCapabilities"
        default_base_url:
          type: ["string", "null"]
        default_model:
          type: ["string", "null"]
        free_tier_note:
          type: ["string", "null"]

    AIProviderConfig:
      type: object
      required: [id, slug, name, is_active, has_api_key, created_at, updated_at]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        base_url:
          type: ["string", "null"]
        default_model:
          type: ["string", "null"]
        is_active:
          type: boolean
        has_api_key:
          type: boolean
        config:
          type: ["object", "null"]
        created_at:
          type: string
        updated_at:
          type: string

    AIProviderConfigInput:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
        name:
          type: string
        api_key:
          type: string
        base_url:
          type: string
        default_model:
          type: string
        config:
          type: object

    AIProviderConfigUpdate:
      type: object
      properties:
        name:
          type: string
        api_key:
          type: string
        base_url:
          type: string
        default_model:
          type: string
        config:
          type: object

    AIProviderActivateResponse:
      type: object
      required: [id, slug, name, is_active, message]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        is_active:
          type: boolean
        message:
          type: string

    AIProviderTestResult:
      type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
        message:
          type: string
        latency_ms:
          type: ["integer", "null"]
        model:
          type: ["string", "null"]

    AIModelInfo:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        context_length:
          type: ["integer", "null"]
        is_free:
          type: ["boolean", "null"]

    AIModelList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AIModelInfo"

    # Storage schemas
    ProjectFile:
      type: object
      required: [id, project_id, path, created_at, updated_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        path:
          type: string
        content:
          type: ["string", "null"]
        mime_type:
          type: ["string", "null"]
        size:
          type: ["integer", "null"]
        created_at:
          type: string
        updated_at:
          type: string

    ProjectFileList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectFile"
        total:
          type: integer

    ProjectFileInput:
      type: object
      required: [path]
      properties:
        path:
          type: string
          minLength: 1
        content:
          type: string
        mime_type:
          type: string

    ProjectFileUpdate:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
        mime_type:
          type: string

    # Memory schemas
    MemoryEntry:
      type: object
      required: [id, project_id, key, value, scope, created_at, updated_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        key:
          type: string
        value: {}
        scope:
          type: string
          enum: [global, session, agent]
        expires_at:
          type: ["string", "null"]
        created_at:
          type: string
        updated_at:
          type: string

    MemoryList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MemoryEntry"
        total:
          type: integer

    MemoryEntryInput:
      type: object
      required: [value]
      properties:
        value: {}
        scope:
          type: string
          enum: [global, session, agent]
          default: global
        ttl_seconds:
          type: integer

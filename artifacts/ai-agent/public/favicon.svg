<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a23"/>
    </linearGradient>
    <linearGradient id="ga" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#c7d2fe"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="55%">
      <stop offset="0%"   stop-color="#818cf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>

  <!-- Glow bloom -->
  <ellipse cx="96" cy="72" rx="70" ry="60" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Top horizontal bar -->
  <line x1="30" y1="42" x2="150" y2="42"
    stroke="url(#ga)" stroke-width="22" stroke-linecap="round"/>

  <!-- Diagonal stem -->
  <line x1="150" y1="42" x2="72" y2="148"
    stroke="url(#gb)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Midline accent -->
  <line x1="52" y1="94" x2="108" y2="94"
    stroke="url(#ga)" stroke-width="15" stroke-linecap="round" opacity="0.65"/>
</svg>
